<!DOCTYPE html>
<html>
<head>

<title>Critical Security Alert</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:black;
color:red;
font-family:monospace;
text-align:center;
}

#box{
margin-top:25vh;
animation:blink 0.8s infinite;
}

#hack{
color:#ff0000;
font-size:18px;
margin-top:30px;
text-shadow:0 0 15px red;
}

@keyframes blink{
50%{opacity:0.3;}
}

</style>

</head>

<body>

<div id="box">

<h1>⚠ CRITICAL SYSTEM ERROR ⚠</h1>

<p>Device access temporarily restricted</p>

<p>Security breach detected...</p>

<p id="count">Analyzing (25)</p>

<div id="hack">
WARNING: Your device is being hacked...<br>
Do not press any button
</div>

</div>

<script>

history.pushState(null,null,location.href);

window.onpopstate=function(){
history.go(1);
};

let time=25;

let c=document.getElementById("count");

let timer=setInterval(function(){

time--;

c.innerText="Analyzing ("+time+")";

if(time<=0){

clearInterval(timer);

document.body.style.color="#00ff00";

document.body.innerHTML=
"<h1 style='margin-top:40vh'>System Safe ✔</h1>";

}

},1000);


// hidden exit

let tap=0;

document.addEventListener("click",function(){

tap++;

if(tap>=3){

document.body.innerHTML=
"<h1 style='color:white;margin-top:40vh'>Prank End 😄</h1>";

}

});

</script>

</body>

</html>
